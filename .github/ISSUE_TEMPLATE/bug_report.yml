name: Bug report
description: Something the framework does is broken, surprising, or contradicts the docs.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug — concrete repros make these fast to fix.

        Before you submit:
        - For "how do I do X?" use [Discussions → Q&A](https://github.com/projik/davepi/discussions/categories/q-a) instead.
        - For security issues, **don't open a public issue** — see [SECURITY.md](https://github.com/projik/davepi/blob/main/SECURITY.md).

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: One or two sentences on the symptom.
      placeholder: e.g. "POST /api/v1/account returns 500 when the body includes an empty `name` field, instead of the expected 400 VALIDATION."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      description: What the framework's documented behaviour suggests should happen here.
      placeholder: e.g. "A 400 with `{ error: { code: 'VALIDATION', ... } }` per the docs at /reference/errors/."
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: |
        The smallest sequence that reliably triggers the bug. If you can
        include a minimal schema file, even better.
      placeholder: |
        1. Drop this schema at `schema/versions/v1/account.js`: …
        2. `npm start`
        3. `curl -X POST http://localhost:5050/api/v1/account -d '{}' …`
        4. Observe: 500 Internal server error.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: schema
    attributes:
      label: Schema file(s)
      description: If the bug involves a specific schema, paste it here.
      render: js

  - type: textarea
    id: logs
    attributes:
      label: Server logs
      description: |
        The Pino JSON line(s) around the failure, if any.

        **Manually redact before pasting.** The framework's logger
        redacts `authorization`, `cookie`, `set-cookie`, `*.password`,
        `*.token`, and `*.encryptedPassword` — but emails, user IDs,
        and other PII are NOT redacted. Strip them yourself before
        posting to a public issue.
      render: text

  - type: input
    id: davepi-version
    attributes:
      label: dAvePi version
      description: From `npm ls davepi` (downstream consumer) or `git rev-parse HEAD` (working in the framework repo).
      placeholder: e.g. 1.0.0 or commit a9fdd02
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: e.g. 20.18.0 or 22.11.0
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Which surface(s)?
      description: Where you saw the bug.
      multiple: true
      options:
        - REST
        - GraphQL
        - MCP (HTTP transport)
        - MCP (stdio transport)
        - Admin SPA
        - Typed client (gen-client)
        - CLI (davepi migrate / mcp / gen-client)
        - Schema loader / hot reload
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Environment quirks, related issues, attempted workarounds.
