name: 'Publish @davepi/mcp'

# Publishes the @davepi/mcp package to npm when a tag matching
# `@davepi/mcp@<version>` is pushed. The tag's <version> must equal
# the package.json's `version` field — the workflow checks this and
# fails fast on mismatch so a stale tag doesn't publish the wrong
# bits.
#
# Required secret:
#   NPM_TOKEN — an npm automation token with publish rights on the
#               @davepi scope.

on:
  push:
    tags:
      - '@davepi/mcp@*'

permissions:
  contents: read
  id-token: write   # for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    defaults:
      run:
        working-directory: packages/mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -e
          # Tag format: @davepi/mcp@<version>
          tag_version="${GITHUB_REF_NAME##*@}"
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::tag version ($tag_version) does not match package.json version ($pkg_version)"
            exit 1
          fi
          echo "Publishing @davepi/mcp@$pkg_version"

      - name: Run package tests before publish
        run: npm test

      - name: Publish to npm with provenance
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
