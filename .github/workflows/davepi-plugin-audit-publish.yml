name: 'Publish davepi-plugin-audit'

# Publishes the davepi-plugin-audit package to npm when a tag
# matching `davepi-plugin-audit@<version>` is pushed. The tag's
# <version> must equal the package.json's `version` field — the
# workflow fails fast on mismatch so a stale tag doesn't publish
# the wrong bits.
#
# Auth + posture mirror packages/davepi-plugin-slack-publish.yml and
# packages/davepi-plugin-postmark-publish.yml: classic NPM_TOKEN via
# the `npm-publish` GitHub Environment so a reviewer approves each
# release. Switch to Trusted Publishing (OIDC) once npm supports it
# for this account.

on:
  push:
    tags:
      - 'davepi-plugin-audit@*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    defaults:
      run:
        working-directory: packages/davepi-plugin-audit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -e
          # Tag format: davepi-plugin-audit@<version>
          tag_version="${GITHUB_REF_NAME##*@}"
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::tag version ($tag_version) does not match package.json version ($pkg_version)"
            exit 1
          fi
          echo "Publishing davepi-plugin-audit@$pkg_version"

      - name: Run package tests before publish
        run: npm test

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
