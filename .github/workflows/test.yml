name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test
        env:
          NODE_ENV: test

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          load: true
          tags: davepi:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke check the image (boots, listens on 4001)
        run: |
          docker network create davepi-ci
          docker run -d --name mongo --network davepi-ci mongo:7
          # wait for mongo to accept connections
          for i in $(seq 1 30); do
            docker exec mongo mongosh --quiet --eval "db.adminCommand('ping').ok" \
              | grep -q 1 && break
            sleep 1
          done
          docker run -d --name davepi --network davepi-ci -p 4001:4001 \
            -e MONGO_URI=mongodb://mongo:27017/davepi \
            -e TOKEN_KEY=ci-only-not-real \
            -e API_PORT=4001 \
            -e PAGE_SIZE=20 \
            -e NODE_ENV=production \
            -e LOG_LEVEL=info \
            -e CORS_ORIGINS=http://localhost:3000 \
            davepi:ci
          for i in $(seq 1 30); do
            curl -fs http://localhost:4001/api-docs/swagger.json > /dev/null && break
            sleep 1
          done
          # Final assertion: swagger.json is served
          curl -fs http://localhost:4001/api-docs/swagger.json > /dev/null
          # Image size sanity check (<300MB; the issue's target is <250MB)
          IMAGE_BYTES=$(docker image inspect davepi:ci --format '{{.Size}}')
          echo "image size: $IMAGE_BYTES bytes"
          test "$IMAGE_BYTES" -lt 314572800
      - name: Cleanup
        if: always()
        run: |
          docker rm -f davepi mongo 2>/dev/null || true
          docker network rm davepi-ci 2>/dev/null || true
