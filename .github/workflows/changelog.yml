name: Changelog

# Fails a PR that hasn't touched CHANGELOG.md, unless the PR carries
# the `skip-changelog` label (apply for chores, internal refactors,
# or doc-only changes that don't need a user-visible note).
#
# The check intentionally runs against the merge base so it sees the
# real diff, not just the latest commit.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  changelog:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-changelog') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify CHANGELOG.md was updated
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -qx CHANGELOG.md; then
            echo "::notice::CHANGELOG.md updated."
            exit 0
          fi
          echo "::error::CHANGELOG.md was not updated in this PR."
          echo ""
          echo "Add an entry under '## [Unreleased]' describing the user-visible"
          echo "change (Added / Changed / Deprecated / Removed / Fixed / Security)."
          echo ""
          echo "If this PR is genuinely changelog-irrelevant (chore, internal"
          echo "refactor, doc fix), apply the 'skip-changelog' label."
          exit 1
