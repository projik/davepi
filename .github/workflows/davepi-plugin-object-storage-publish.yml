name: 'Publish davepi-plugin-object-storage'

# Publishes the davepi-plugin-object-storage package to npm when a tag matching
# `davepi-plugin-object-storage@<version>` is pushed. The tag's <version> must
# equal the package.json's `version` field — the workflow fails fast
# on mismatch so a stale tag doesn't publish the wrong bits.
#
# Auth + posture mirror the slack / postmark / audit publish workflows:
# classic NPM_TOKEN via the `npm-publish` GitHub Environment so a
# reviewer approves each release. Switch to Trusted Publishing (OIDC)
# once npm supports it for this account.

on:
  push:
    tags:
      - 'davepi-plugin-object-storage@*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    defaults:
      run:
        working-directory: packages/davepi-plugin-object-storage
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -e
          # Tag format: davepi-plugin-object-storage@<version>
          tag_version="${GITHUB_REF_NAME##*@}"
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::tag version ($tag_version) does not match package.json version ($pkg_version)"
            exit 1
          fi
          echo "Publishing davepi-plugin-object-storage@$pkg_version"

      - name: Install package dependencies
        # @aws-sdk/client-s3 + @aws-sdk/s3-request-presigner are hard
        # runtime deps. @google-cloud/storage is an optionalDependency
        # — `npm install` will attempt it but won't fail the workflow
        # if it can't fetch. The slack publish workflow skips this step
        # because that package is zero-dep; we can't.
        run: npm install --no-audit --no-fund

      - name: Run package tests before publish
        run: npm test

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
